<!DOCTYPE html>
<html>
<head>
  <title>Playback - Spotify Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
    a.btn, button.btn { display: inline-block; background: #1DB954; color: #fff; text-decoration: none;
            padding: 16px 32px; font-size: 18px; border-radius: 24px; margin-top: 20px; border: none; cursor: pointer; }
    p { font-size: 16px; }
    .debug { font-size: 10px; color: #666; word-break: break-all; margin-top: 30px; }
    input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; margin-top: 10px; }
    .settings { margin-bottom: 30px; padding: 20px; border: 1px solid #333; border-radius: 8px; text-align: left; }
    .settings label { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="settings">
    <label>Spotify Client ID</label>
    <input type="text" id="clientIdInput" placeholder="Paste your Client ID here">
    <p style="font-size: 12px; color: #666; margin-top: 8px;">
      "Get your Client ID — see <a href="setup.html">Setup Guide</a>"
    </p>
  </div>

  <p id="status">Connect your Spotify account</p>
  <div id="action"></div>
  <p id="debug" class="debug"></p>

  <script>
    var DEFAULT_CLIENT_ID = '';
    var REDIRECT_URI = 'https://ww2.github.io/playback_config/';
    var SCOPES = 'user-read-playback-state user-modify-playback-state user-read-currently-playing playlist-read-private user-library-read user-follow-read';

    // --- Parse query params ---
    function getQueryParam(name) {
      var params = window.location.search.substring(1).split('&');
      for (var i = 0; i < params.length; i++) {
        var kv = params[i].split('=');
        if (kv[0] === name) return decodeURIComponent(kv[1]);
      }
      return null;
    }

    var clientIdInput = document.getElementById('clientIdInput');
    clientIdInput.value = getQueryParam('client_id') || localStorage.getItem('custom_client_id') || '';
    clientIdInput.onchange = function() { localStorage.setItem('custom_client_id', clientIdInput.value.trim()); };

    function getActiveClientId() {
      return clientIdInput.value.trim() || sessionStorage.getItem('pkce_client_id') || DEFAULT_CLIENT_ID;
    }

    // --- PKCE helpers ---
    function generateRandom(length) {
      var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      var arr = new Uint8Array(length);
      crypto.getRandomValues(arr);
      var result = '';
      for (var i = 0; i < length; i++) result += chars[arr[i] % chars.length];
      return result;
    }

    function sha256(plain) {
      var encoder = new TextEncoder();
      return crypto.subtle.digest('SHA-256', encoder.encode(plain)).then(function(buf) {
        var bytes = new Uint8Array(buf);
        var binary = '';
        for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      });
    }

    var debug = document.getElementById('debug');
    var code = getQueryParam('code');
    var error = getQueryParam('error');

    if (code) {
      document.getElementById('status').textContent = 'Getting token...';
      var verifier = sessionStorage.getItem('pkce_verifier');
      if (!verifier) {
        document.getElementById('status').textContent = 'Session expired. Please try again.';
      } else {
        var body = 'grant_type=authorization_code' +
          '&code=' + encodeURIComponent(code) +
          '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
          '&client_id=' + encodeURIComponent(getActiveClientId()) +
          '&code_verifier=' + encodeURIComponent(verifier);

        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://accounts.spotify.com/api/token', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.onload = function() {
          if (xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            var result = JSON.stringify({
              token: data.access_token,
              refreshToken: data.refresh_token,
              expiresIn: data.expires_in || 3600,
              clientId: getActiveClientId()
            });
            var closeUrl = 'pebblejs://close#' + encodeURIComponent(result);
            document.getElementById('status').textContent = 'Logged in to Spotify!';
            document.getElementById('action').innerHTML = '<a class="btn" href="' + closeUrl + '">Return to Pebble</a>';
          } else {
            document.getElementById('status').textContent = 'Token error: ' + xhr.status;
            debug.textContent = xhr.responseText;
          }
        };
        xhr.onerror = function() { document.getElementById('status').textContent = 'Network error getting token'; };
        xhr.send(body);
      }
    } else if (error) {
      document.getElementById('status').textContent = 'Auth error: ' + error;
    } else {
      document.getElementById('action').innerHTML = '<button class="btn" id="loginBtn">Log in with Spotify</button>';
      document.getElementById('loginBtn').onclick = function() {
        if (!getActiveClientId()) {                                                 
    document.getElementById('status').textContent = 'Enter your Client ID first';                                                                 
    return;                                                                     
        }        
        var verifier = generateRandom(64);
        sessionStorage.setItem('pkce_verifier', verifier);
        sessionStorage.setItem('pkce_client_id', getActiveClientId());
        sha256(verifier).then(function(challenge) {
          var authUrl = 'https://accounts.spotify.com/authorize' +
            '?client_id=' + encodeURIComponent(getActiveClientId()) +
            '&response_type=code' +
            '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
            '&scope=' + encodeURIComponent(SCOPES) +
            '&show_dialog=true' +
            '&code_challenge_method=S256' +
            '&code_challenge=' + challenge;
          window.location.href = authUrl;
        });
      };
    }
  </script>
</body>
</html>
